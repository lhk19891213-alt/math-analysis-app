<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学分析智能解题平台 (账户版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { academic: { 50: '#f8fafc', 800: '#1e293b', 900: '#0f172a' } } } } }
    </script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] }, svg: { fontCache: 'global' } };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-academic-900 dark:text-slate-100 min-h-screen">

    <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-academic-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">MathAnalysis.AI</span>
                <span class="text-xs bg-emerald-50 text-emerald-600 dark:bg-emerald-950/50 dark:text-emerald-400 px-2 py-0.5 rounded font-medium">已启用安全账户层</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <div id="userAuthArea" class="text-sm font-medium">
                    </div>
                <button id="themeToggle" class="p-2 bg-slate-100 dark:bg-slate-700 rounded-lg text-xs">🌙 夜间</button>
                <button id="configToggle" class="p-2 bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-lg text-xs font-medium">⚙️ API 配置</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div id="configPanel" class="hidden bg-yellow-50 dark:bg-yellow-950/20 border border-yellow-200 dark:border-yellow-900/50 p-4 rounded-xl">
                <h3 class="font-bold text-yellow-800 dark:text-yellow-400 mb-2 text-sm">Gemini API 部署</h3>
                <div class="flex gap-2">
                    <input type="password" id="apiKeyInput" placeholder="输入您的 Gemini API Key" class="flex-1 p-2 text-xs border rounded bg-white dark:bg-slate-800">
                    <button id="saveKeyBtn" class="bg-yellow-600 text-white px-4 py-2 rounded text-xs">保存</button>
                </div>
            </div>

            <div class="bg-white dark:bg-academic-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm">
                <div class="mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-2 border-b border-slate-100 dark:border-slate-700/50 pb-3">
                    <span class="text-xs font-bold text-slate-500 dark:text-slate-400 flex items-center gap-1">
                        🎯 华东师大《数分》核心题库精选：
                    </span>
                    <select id="questionBankSelect" class="text-xs p-2 rounded-xl bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-72">
                        <option value="">✨ 点击选择一道经典难题快速注入 --</option>
                        <option value="求极限：\lim_{x \to 0} \frac{\cos(\sin x) - \cos x}{x^4}">【极限】Taylor 展开压轴经典未定式</option>
                        <option value="设 f(x) 在 [0,1] 上二阶可导，f(0)=f(1)=0，且 \min_{x\in[0,1]}f(x)=-1。证明：\max_{x\in[0,1]}f''(x) \ge 8">【微分】中值定理与二阶导数曲率估计证明题</option>
                        <option value="计算定积分：\int_{0}^{\pi} \frac{x \sin x}{1 + \cos^2 x} dx">【积分】对称区间变换与三角有理式积分神题</option>
                        <option value="判定级数 \sum_{n=1}^{\infty} (-1)^n \frac{\ln n}{n} 的绝对收敛与条件收敛性。">【级数】任意项级数交错审敛与 Dirichlet 判别</option>
                    </select>
                </div>

                <textarea id="problemInput" rows="4" placeholder="请输入数学分析题目（支持标准 LaTeX）..." class="w-full p-4 border rounded-xl bg-slate-50 dark:bg-slate-900 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                <div class="mt-2 p-3 bg-slate-100 dark:bg-slate-900/50 rounded-lg text-[11px] text-slate-400">
                    实时预览：<div id="latexPreview" class="mt-1 min-h-[20px] text-slate-800 dark:text-slate-200"></div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div class="flex gap-2">
                        <label class="cursor-pointer bg-slate-100 dark:bg-slate-700 px-3 py-2 rounded-xl text-xs font-medium">
                            📷 图片识别 <input type="file" id="ocrInput" accept="image/*" class="hidden">
                        </label>
                        <button id="randomPickBtn" class="hidden">🎲 随机抽题</button>
                        <button id="aiDrawBtn" class="bg-purple-50 text-purple-600 dark:bg-purple-950/40 dark:text-purple-400 px-3 py-2 rounded-xl text-xs font-bold hover:bg-purple-100 transition flex items-center gap-1">🔮 AI 盲盒出题</button>
                    </div>
                    <button id="solveBtn" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-blue-700">🚀 智能解题</button>
                </div>
            </div>

            <div id="solutionWrapper" class="hidden bg-white dark:bg-academic-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700/50 space-y-4">
                <div class="flex justify-between items-center border-b pb-2">
                    <h2 class="text-base font-bold text-emerald-600">🎓 华东师大规范解答</h2>
                    <div class="flex gap-2 text-xs">
                        <button id="copyLatexBtn" class="bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded">复制 LaTeX</button>
                        <button id="printBtn" class="bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded">🖨️ 打印</button>
                    </div>
                </div>
                <div id="solutionContent" class="prose dark:prose-invert max-w-none text-sm space-y-3"></div>
                <div class="border rounded-xl overflow-hidden mt-4">
                    <div class="bg-slate-100 dark:bg-slate-700 px-4 py-1.5 text-[11px] font-bold">📊 Desmos 动态可视化图像</div>
                    <div id="desmosCalculator" class="w-full h-64 bg-white"></div>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white dark:bg-academic-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold">⏳ 账户历史存档</h2>
                    <button id="exportHistoryBtn" class="text-[11px] text-blue-500 hover:underline">导出.txt</button>
                </div>
                <div id="historyList" class="space-y-3 max-h-96 overflow-y-auto"></div>
            </div>
        </div>
    </main>

    <div id="authModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-academic-800 p-6 rounded-2xl w-full max-w-sm border shadow-xl mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-base font-bold">用户登录</h3>
                <button onclick="toggleAuthModal(false)" class="text-slate-400 text-lg">&times;</button>
            </div>
            <div class="space-y-3">
                <input type="text" id="authUsername" placeholder="请输入账号" class="w-full p-2.5 text-sm border rounded-xl bg-slate-50 dark:bg-slate-900">
                <input type="password" id="authPassword" placeholder="请输入密码" class="w-full p-2.5 text-sm border rounded-xl bg-slate-50 dark:bg-slate-900">
                <div class="flex justify-between items-center text-xs text-blue-500 py-1">
                    <span id="switchAuthModeBtn" class="cursor-pointer hover:underline" onclick="switchAuthMode()">没有账号？立即注册</span>
                </div>
                <button id="authSubmitBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-blue-700 transition">建立安全连接</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bankSelect = document.getElementById('questionBankSelect');
            const problemInput = document.getElementById('problemInput');
            const solveBtn = document.getElementById('solveBtn');
            const aiDrawBtn = document.getElementById('aiDrawBtn');

            // 1. 固定题库选择联动
            if (bankSelect && problemInput) {
                bankSelect.addEventListener('change', function() {
                    if (this.value) {
                        problemInput.value = this.value;
                        problemInput.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                });
            }

            // 2. AI 盲盒自主出题联动（核心新功能）
            if (aiDrawBtn && problemInput && solveBtn) {
                aiDrawBtn.addEventListener('click', () => {
                    const aiPrompts = [
                        "【AI 盲盒挑战】请随机为你自己设计一道极具挑战性的《数学分析》「极限与连续性」难题。请先明确列出【题目】，随后给出详细的【华东师大规范解答】。",
                        "【AI 盲盒挑战】请随机为你自己设计一道关于《数学分析》「导数应用或中值定理」的压轴证明题。请先明确列出【题目】，随后给出详细的【华东师大规范解答】。",
                        "【AI 盲盒挑战】请随机为你自己设计一道《数学分析》「定积分、广义积分或含参变量积分」的计算难题。请先明确列出【题目】，随后给出详细的【华东师大规范解答】。",
                        "【AI 盲盒挑战】请随机为你自己设计一道关于《数学分析》「无穷级数或幂级数展开」的魔鬼审敛判定题。请先明确列出【题目】，随后给出详细的【华东师大规范解答】。"
                    ];
                    // 随机抽取一个方向的 prompt 塞进输入框
                    const randomPrompt = aiPrompts[Math.floor(Math.random() * aiPrompts.length)];
                    problemInput.value = randomPrompt;
                    problemInput.dispatchEvent(new Event('input', { bubbles: true }));
                    
                    // 稍等 200 毫秒让前端响应，然后自动替用户点击“智能解题”
                    setTimeout(() => {
                        solveBtn.click();
                    }, 200);
                });
            }
        });
    </script>
</body>
</html>
